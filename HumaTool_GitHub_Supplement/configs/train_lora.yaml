# GR00T / VLA LoRA fine-tuning configuration example
model:
  backbone: GR00T N1.6
  adaptation: LoRA
  freeze_visual_language_backbone: true
  train_action_module: true

dataset:
  demonstrations: 30
  task: electric_drill_grasping
  instruction: "Pick up the industrial object."
  format: teleoperation_action_chunks

training:
  learning_rate: 1.0e-4
  optimizer: AdamW
  weight_decay: 1.0e-5
  gradient_clipping_threshold: 1.0
  learning_rate_schedule: cosine_annealing

simulation:
  environment: Isaac Sim
  robot: Unitree G1
  object: electric_drill
