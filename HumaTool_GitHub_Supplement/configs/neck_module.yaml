# Head-neck module configuration example
neck:
  degrees_of_freedom: 2
  yaw_limit_deg: 90
  pitch_limit_deg: 45
  control_frequency_hz: 60
  smoothing_alpha: 0.25

camera:
  type: ZED Mini
  target_frame_rate_fps: 30
  feedback_mode: first_person_stereo

motor:
  encoder_steps_per_rev: 4096
  yaw_zero_step: 2048
  pitch_zero_step: 2048
  communication: "replace_with_actual_sdk"
